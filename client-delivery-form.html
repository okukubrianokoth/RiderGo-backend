<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Delivery - RiderGo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-section {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .location-input-wrapper {
            position: relative;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Autocomplete Suggestions */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: #f5f5f5;
        }

        .suggestion-item .location-name {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .suggestion-item .location-address {
            font-size: 12px;
            color: #999;
        }

        .location-icon {
            display: inline-block;
            margin-right: 8px;
            color: #667eea;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .row.full {
            grid-template-columns: 1fr;
        }

        .price-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            border-left: 4px solid #667eea;
        }

        .price-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .price-info:last-child {
            margin-bottom: 0;
            font-weight: 600;
            font-size: 16px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .price-info .label {
            color: #666;
        }

        .price-info .value {
            color: #333;
            font-weight: 500;
        }

        .price-info.total .value {
            color: #667eea;
            font-size: 20px;
        }

        .estimation-loading {
            display: none;
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .estimation-loading.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .surge-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 6px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .success-message {
            color: #51cf66;
            font-size: 14px;
            margin-top: 6px;
            display: none;
        }

        .success-message.active {
            display: block;
        }

        .eta-box {
            background: #e3f2fd;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 8px;
            color: #1976d2;
            display: none;
        }

        .eta-box.active {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .service-type-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .service-option {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        .service-option input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .service-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .service-option.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .token-display {
            background: #f0f9ff;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #0c5a8c;
            word-break: break-all;
            margin-bottom: 20px;
            max-height: 60px;
            overflow-y: auto;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Request Delivery</h1>
            <p>Complete the form and we'll match you with a rider</p>
        </div>

        <div class="form-section">
            <form id="deliveryForm">
                <!-- Token Display -->
                <div class="token-display" id="tokenDisplay" style="display: none;">
                    <strong>Auth Token:</strong> <span id="tokenValue"></span>
                </div>

                <!-- Pickup Location -->
                <div class="form-group">
                    <label for="pickupLocation">🚩 Pickup Location</label>
                    <div class="location-input-wrapper">
                        <input 
                            type="text" 
                            id="pickupLocation" 
                            placeholder="Enter pickup address or search location..."
                            autocomplete="off"
                            required
                        >
                        <div class="suggestions" id="pickupSuggestions"></div>
                    </div>
                    <div class="error-message" id="pickupError"></div>
                </div>

                <!-- Dropoff Location -->
                <div class="form-group">
                    <label for="dropoffLocation">📍 Dropoff Location</label>
                    <div class="location-input-wrapper">
                        <input 
                            type="text" 
                            id="dropoffLocation" 
                            placeholder="Enter destination address or search location..."
                            autocomplete="off"
                            required
                        >
                        <div class="suggestions" id="dropoffSuggestions"></div>
                    </div>
                    <div class="error-message" id="dropoffError"></div>
                </div>

                <!-- Service Type -->
                <div class="form-group">
                    <label>📋 Service Type</label>
                    <div class="service-type-group">
                        <label class="service-option">
                            <input type="radio" name="serviceType" value="delivery" checked>
                            <span>Delivery</span>
                        </label>
                        <label class="service-option">
                            <input type="radio" name="serviceType" value="move">
                            <span>Move Items</span>
                        </label>
                    </div>
                </div>

                <!-- Package Details -->
                <div class="form-group">
                    <label for="packageType">📦 Package Type</label>
                    <select id="packageType" required>
                        <option value="">Select package type...</option>
                        <option value="documents">Documents</option>
                        <option value="food">Food</option>
                        <option value="parcels">Parcels</option>
                        <option value="fragile">Fragile Items</option>
                        <option value="electronics">Electronics</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group full">
                    <label for="packageDescription">📝 Package Description</label>
                    <textarea 
                        id="packageDescription" 
                        placeholder="Describe what you're sending (e.g., 2x electronics boxes, weight info, etc.)"
                    ></textarea>
                </div>

                <!-- Recipient Details -->
                <div class="row">
                    <div class="form-group">
                        <label for="recipientName">👤 Recipient Name</label>
                        <input type="text" id="recipientName" placeholder="Full name" required>
                    </div>
                    <div class="form-group">
                        <label for="recipientPhone">📞 Recipient Phone</label>
                        <input type="tel" id="recipientPhone" placeholder="+254..." required>
                    </div>
                </div>

                <!-- Special Instructions -->
                <div class="form-group full">
                    <label for="specialInstructions">💬 Special Instructions</label>
                    <textarea 
                        id="specialInstructions" 
                        placeholder="Add any special instructions (e.g., call before arriving, handle with care, etc.)"
                    ></textarea>
                </div>

                <!-- Payment Method -->
                <div class="form-group">
                    <label>💳 Payment Method</label>
                    <select id="paymentMethod" required>
                        <option value="cash">Cash on Delivery</option>
                        <option value="mpesa">M-Pesa</option>
                        <option value="card">Card</option>
                        <option value="wallet">Use Wallet</option>
                    </select>
                </div>

                <!-- Price Estimation -->
                <div class="form-group" id="priceSection" style="display: none;">
                    <div class="price-display">
                        <div class="price-info">
                            <span class="label">Distance</span>
                            <span class="value" id="distanceValue">--</span>
                        </div>
                        <div class="price-info">
                            <span class="label">Estimated Time</span>
                            <span class="value" id="timeValue">--</span>
                        </div>
                        <div class="price-info">
                            <span class="label">Base Fare</span>
                            <span class="value" id="baseFareValue">--</span>
                        </div>
                        <div class="price-info">
                            <span class="label">
                                Surge
                                <span class="surge-badge" id="surgeBadge" style="display: none;">SURGE</span>
                            </span>
                            <span class="value" id="surgeValue">1x</span>
                        </div>
                        <div class="price-info total">
                            <span class="label">Total Price</span>
                            <span class="value" id="priceValue">KES 0</span>
                        </div>
                    </div>
                    <div class="eta-box" id="etaBox">
                        ⏱️ Rider will arrive in <strong id="etaValue">--</strong>
                    </div>
                    <div class="estimation-loading" id="estimationLoading">
                        <span class="loading-spinner"></span> Calculating price...
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn">Request Delivery</button>
                <div class="error-message" id="formError"></div>
                <div class="success-message" id="formSuccess"></div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // Configuration
        // ==========================================
        const API_BASE_URL = 'http://localhost:3000/api'; // Change this to your API URL
        let currentToken = localStorage.getItem('clientToken');
        const pickupInput = document.getElementById('pickupLocation');
        const dropoffInput = document.getElementById('dropoffLocation');
        const form = document.getElementById('deliveryForm');

        let selectedPickup = null;
        let selectedDropoff = null;

        // ==========================================
        // Initialize Token
        // ==========================================
        window.addEventListener('load', () => {
            if (currentToken) {
                document.getElementById('tokenDisplay').style.display = 'block';
                document.getElementById('tokenValue').textContent = currentToken.substring(0, 20) + '...';
            }
        });

        // ==========================================
        // Location Search Function
        // ==========================================
        async function searchLocation(query, suggestionsElementId) {
            if (query.length < 2) {
                document.getElementById(suggestionsElementId).classList.remove('active');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/client/search?query=${encodeURIComponent(query)}`);
                const data = await response.json();

                const suggestionsElement = document.getElementById(suggestionsElementId);
                suggestionsElement.innerHTML = '';

                if (data.success && data.results && data.results.length > 0) {
                    data.results.forEach(location => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerHTML = `
                            <div class="location-name">
                                <span class="location-icon">📍</span>${location.name}
                            </div>
                            <div class="location-address">${location.address}</div>
                        `;
                        div.addEventListener('click', () => {
                            selectLocation(suggestionsElementId === 'pickupSuggestions' ? 'pickup' : 'dropoff', location);
                        });
                        suggestionsElement.appendChild(div);
                    });
                    suggestionsElement.classList.add('active');
                } else {
                    suggestionsElement.classList.remove('active');
                }
            } catch (error) {
                console.error('Search error:', error);
                document.getElementById(suggestionsElementId).classList.remove('active');
            }
        }

        // ==========================================
        // Select Location
        // ==========================================
        function selectLocation(type, location) {
            if (type === 'pickup') {
                pickupInput.value = location.name;
                document.getElementById('pickupSuggestions').classList.remove('active');
                selectedPickup = location;
            } else {
                dropoffInput.value = location.name;
                document.getElementById('dropoffSuggestions').classList.remove('active');
                selectedDropoff = location;
            }

            // Auto-estimate price when both locations are selected
            if (selectedPickup && selectedDropoff) {
                estimatePrice();
            }
        }

        // ==========================================
        // Event Listeners for Location Search
        // ==========================================
        pickupInput.addEventListener('input', (e) => {
            searchLocation(e.target.value, 'pickupSuggestions');
        });

        dropoffInput.addEventListener('input', (e) => {
            searchLocation(e.target.value, 'dropoffSuggestions');
        });

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.location-input-wrapper')) {
                document.getElementById('pickupSuggestions').classList.remove('active');
                document.getElementById('dropoffSuggestions').classList.remove('active');
            }
        });

        // ==========================================
        // Estimate Price
        // ==========================================
        async function estimatePrice() {
            if (!selectedPickup || !selectedDropoff) return;

            document.getElementById('estimationLoading').classList.add('active');
            document.getElementById('priceSection').style.display = 'block';

            try {
                const response = await fetch(`${API_BASE_URL}/client/estimate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        pickupLat: selectedPickup.lat,
                        pickupLng: selectedPickup.lon,
                        dropoffLat: selectedDropoff.lat,
                        dropoffLng: selectedDropoff.lon
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('distanceValue').textContent = `${data.distance} km`;
                    document.getElementById('timeValue').textContent = data.time;
                    document.getElementById('priceValue').textContent = `KES ${data.price.toLocaleString()}`;
                    document.getElementById('etaValue').textContent = data.eta;
                    document.getElementById('etaBox').classList.add('active');
                    
                    // Show surge badge if applicable
                    if (data.surgeApplied) {
                        document.getElementById('surgeBadge').style.display = 'inline-block';
                        document.getElementById('surgeValue').textContent = `${data.surgeMultiplier}x`;
                    } else {
                        document.getElementById('surgeBadge').style.display = 'none';
                        document.getElementById('surgeValue').textContent = '1x';
                    }

                    // You can add base fare display if needed
                    document.getElementById('baseFareValue').textContent = 'KES 150';
                }
            } catch (error) {
                console.error('Estimation error:', error);
                showError('formError', 'Failed to calculate price estimate');
            } finally {
                document.getElementById('estimationLoading').classList.remove('active');
            }
        }

        // ==========================================
        // Form Submission
        // ==========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate selections
            if (!selectedPickup) {
                showError('pickupError', 'Please select a pickup location');
                return;
            }
            if (!selectedDropoff) {
                showError('dropoffError', 'Please select a dropoff location');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                const payload = {
                    pickupLat: selectedPickup.lat,
                    pickupLng: selectedPickup.lon,
                    pickup: selectedPickup.name,
                    pickupAddress: selectedPickup.address,
                    dropoffLat: selectedDropoff.lat,
                    dropoffLng: selectedDropoff.lon,
                    dropoff: selectedDropoff.name,
                    dropoffAddress: selectedDropoff.address,
                    serviceType: document.getElementById('serviceType').value || 'delivery',
                    packageType: document.getElementById('packageType').value,
                    packageDescription: document.getElementById('packageDescription').value,
                    recipientName: document.getElementById('recipientName').value,
                    recipientPhone: document.getElementById('recipientPhone').value,
                    specialInstructions: document.getElementById('specialInstructions').value,
                    paymentMethod: document.getElementById('paymentMethod').value
                };

                const headers = {
                    'Content-Type': 'application/json'
                };

                if (currentToken) {
                    headers['Authorization'] = `Bearer ${currentToken}`;
                }

                const response = await fetch(`${API_BASE_URL}/client/delivery`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('formSuccess', '✅ Delivery request created successfully! Rider will be assigned shortly.');
                    form.reset();
                    selectedPickup = null;
                    selectedDropoff = null;
                    document.getElementById('priceSection').style.display = 'none';
                    
                    // Redirect to delivery tracking after 2 seconds
                    setTimeout(() => {
                        // You can redirect to a tracking page or order list
                        alert(`Delivery ID: ${data.delivery._id}`);
                    }, 2000);
                } else {
                    showError('formError', data.message || 'Failed to create delivery request');
                }
            } catch (error) {
                console.error('Submission error:', error);
                showError('formError', 'Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Request Delivery';
            }
        });

        // ==========================================
        // Helper Functions
        // ==========================================
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('active');
            setTimeout(() => element.classList.remove('active'), 5000);
        }

        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('active');
        }

        // Service type selection styling
        document.querySelectorAll('.service-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.service-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input[type="radio"]').checked = true;
            });
        });
    </script>
</body>
</html>
